<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim Crow Laws Database</title>
    <!-- React CDN -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .search-card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .result-card {
            transition: box-shadow 0.2s;
        }
        .result-card:hover {
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.15);
        }
        .law-text {
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 1rem;
            font-family: 'Georgia', serif;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [searchResults, setSearchResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            
            // Search filters
            const [keyword, setKeyword] = useState('');
            const [yearFrom, setYearFrom] = useState('1865');
            const [yearTo, setYearTo] = useState('1965');
            const [category, setCategory] = useState('all');
            
            // Available categories from our database
            const categories = [
                { value: 'all', label: 'All Categories' },
                { value: 'education', label: 'Education' },
                { value: 'marriage', label: 'Marriage' }
            ];

            // Search function that calls the backend API
            const handleSearch = async () => {
                setLoading(true);
                setError('');
                
                try {
                    // Build query parameters
                    const params = new URLSearchParams();
                    if (keyword) params.append('keyword', keyword);
                    if (category !== 'all') params.append('category', category);
                    if (yearFrom) params.append('year_from', yearFrom);
                    if (yearTo) params.append('year_to', yearTo);
                    
                    // Make API call to backend
                    const response = await fetch(`http://localhost:5000/search?${params.toString()}`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    setSearchResults(data.laws || []);
                } catch (err) {
                    setError('Error connecting to database. Please ensure the server is running.');
                    console.error('Search error:', err);
                    setSearchResults([]);
                } finally {
                    setLoading(false);
                }
            };

            // Initial search
            useEffect(() => {
                handleSearch();
            }, []);

            return (
                <div className="container py-4">
                    <div className="row mb-4">
                        <div className="col text-center">
                            <h1 className="display-5">Jim Crow Laws Database</h1>
                            <p className="lead text-muted">
                                Search and explore historical Jim Crow laws from Kentucky (1865-1965)
                            </p>
                        </div>
                    </div>

                    {/* Search Filters */}
                    <div className="row mb-4">
                        <div className="col">
                            <div className="card search-card">
                                <div className="card-body">
                                    <h5 className="card-title">Search Filters</h5>
                                    <form onSubmit={(e) => { e.preventDefault(); handleSearch(); }}>
                                        <div className="row mb-3">
                                            <div className="col-md-6">
                                                <label className="form-label">Keyword Search</label>
                                                <input
                                                    type="text"
                                                    className="form-control"
                                                    placeholder="Search in titles, content, or keywords..."
                                                    value={keyword}
                                                    onChange={(e) => setKeyword(e.target.value)}
                                                />
                                                <div className="form-text">
                                                    Search across law titles, content, summaries, and keywords
                                                </div>
                                            </div>
                                            <div className="col-md-6">
                                                <label className="form-label">Law Category</label>
                                                <select
                                                    className="form-select"
                                                    value={category}
                                                    onChange={(e) => setCategory(e.target.value)}
                                                >
                                                    {categories.map((cat) => (
                                                        <option key={cat.value} value={cat.value}>
                                                            {cat.label}
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div className="row mb-3">
                                            <div className="col-md-3">
                                                <label className="form-label">Year From</label>
                                                <input
                                                    type="number"
                                                    className="form-control"
                                                    min="1865"
                                                    max="1965"
                                                    value={yearFrom}
                                                    onChange={(e) => setYearFrom(e.target.value)}
                                                />
                                            </div>
                                            <div className="col-md-3">
                                                <label className="form-label">Year To</label>
                                                <input
                                                    type="number"
                                                    className="form-control"
                                                    min="1865"
                                                    max="1965"
                                                    value={yearTo}
                                                    onChange={(e) => setYearTo(e.target.value)}
                                                />
                                            </div>
                                            <div className="col-md-6 d-flex align-items-end">
                                                <div className="d-grid gap-2 d-md-flex w-100">
                                                    <button 
                                                        type="submit" 
                                                        className="btn btn-primary flex-fill"
                                                        disabled={loading}
                                                    >
                                                        {loading ? 'Searching...' : 'Search'}
                                                    </button>
                                                    <button 
                                                        type="button" 
                                                        className="btn btn-outline-secondary"
                                                        onClick={() => {
                                                            setKeyword('');
                                                            setYearFrom('1865');
                                                            setYearTo('1965');
                                                            setCategory('all');
                                                            setTimeout(handleSearch, 100);
                                                        }}
                                                    >
                                                        Clear
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Error Message */}
                    {error && (
                        <div className="row mb-3">
                            <div className="col">
                                <div className="alert alert-danger">{error}</div>
                            </div>
                        </div>
                    )}

                    {/* Search Results */}
                    <div className="row">
                        <div className="col">
                            <h5>Search Results ({searchResults.length} laws found)</h5>
                            
                            {loading ? (
                                <div className="text-center py-5">
                                    <div className="spinner-border" role="status">
                                        <span className="visually-hidden">Loading...</span>
                                    </div>
                                    <p className="mt-2">Searching...</p>
                                </div>
                            ) : searchResults.length === 0 ? (
                                <div className="card">
                                    <div className="card-body text-center py-5">
                                        <h6>No laws found</h6>
                                        <p className="text-muted">
                                            Try adjusting your search filters or keywords to find relevant legislation.
                                        </p>
                                    </div>
                                </div>
                            ) : (
                                searchResults.map((law) => (
                                    <div key={law.id} className="card mb-3 result-card">
                                        <div className="card-body">
                                            <div className="row">
                                                <div className="col">
                                                    <h6 className="card-title">{law.title}</h6>
                                                    
                                                    <div className="mb-2">
                                                        <small className="text-muted">
                                                            <strong>Year:</strong> {law.year} | 
                                                            <strong> Citation:</strong> {law.citation}
                                                        </small>
                                                    </div>

                                                    <div className="mb-2">
                                                        <span className="badge bg-secondary me-1">
                                                            {law.category.charAt(0).toUpperCase() + law.category.slice(1)}
                                                        </span>
                                                    </div>

                                                    <div className="card-text mb-3">
                                                        {law.summary}
                                                    </div>

                                                    {law.keywords && (
                                                        <div className="mb-2">
                                                            <small className="text-muted">
                                                                <strong>Keywords:</strong> {law.keywords.join(', ')}
                                                            </small>
                                                        </div>
                                                    )}

                                                    {law.ocr_text && (
                                                        <div className="law-text">
                                                            {law.ocr_text}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
